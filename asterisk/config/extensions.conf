[internal]
include => parkedcalls
exten => 700,1,Playback(/etc/asterisk/sounds/parqueo_mensaje)
 same => n,Park()
exten => _XXXX,1,NoOp(Llamando a extension ${EXTEN} desde ${CALLERID(num)})
 same => n,MixMonitor(${CHANNEL(linkedid)}.wav,b)
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

exten => h,1,NoOp(Llamada finalizada - canal: ${CHANNEL})

; Extension de prueba para simular carga (genera tono real -> trafico RTP medible)
exten => 9999,1,NoOp(Prueba de carga - canal ${CHANNEL})
 same => n,Answer()
 same => n,Milliwatt()
