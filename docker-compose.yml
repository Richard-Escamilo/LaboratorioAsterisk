version: "3.9"
services:
  db:
    image: mariadb:10.6
    container_name: lab-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - lab-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:15
    container_name: lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: midpoint
      POSTGRES_USER: midpoint
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U midpoint"]
      interval: 10s
      timeout: 5s
      retries: 5
  midpoint:
    image: evolveum/midpoint:latest
    container_name: lab-midpoint
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MP_SET_midpoint_repository_jdbcUrl: jdbc:postgresql://postgres:5432/midpoint
      MP_SET_midpoint_repository_jdbcUsername: midpoint
      MP_SET_midpoint_repository_jdbcPassword: ${PG_PASSWORD}
      MP_SET_midpoint_repository_database: postgresql
    ports:
      - "8080:8080"
    volumes:
      - midpoint_home:/opt/midpoint/var
    networks:
      - lab-net
  asterisk:
    image: andrius/asterisk:20
    container_name: lab-asterisk
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/usr/local/bin/render-and-start.sh"]
    command: ["asterisk", "-vvvdddf", "-T", "-W", "-U", "asterisk", "-p"]
    environment:
      PUBLIC_IP: ${PUBLIC_IP}
      LOCAL_NET: ${LOCAL_NET}
      RTP_START: ${RTP_START}
      RTP_END: ${RTP_END}
      AMI_PASSWORD: ${AMI_PASSWORD}
      PUID: 1000
      PGID: 1000
    volumes:
      - ./asterisk/config:/etc/asterisk
      - ./asterisk/render-and-start.sh:/usr/local/bin/render-and-start.sh:ro
      - asterisk_data:/var/lib/asterisk
      - recordings_data:/var/spool/asterisk/monitor
  call-monitor-backend:
    build:
      context: ./call-monitor-backend
    container_name: lab-call-monitor
    restart: unless-stopped
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASTERISK_HOST: host.docker.internal
      AMI_USER: call-monitor
      AMI_PASSWORD: ${AMI_PASSWORD}
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 4000
      ASTERISK_CONFIG_DIR: /asterisk-config
      MIDPOINT_BASE_URL: ${MIDPOINT_BASE_URL}
      MIDPOINT_USER: ${MIDPOINT_USER}
      MIDPOINT_PASSWORD: ${MIDPOINT_PASSWORD}
      AGENTE_ROLE_OID: ${AGENTE_ROLE_OID}
      SUPERVISOR_ROLE_OID: ${SUPERVISOR_ROLE_OID}
      ADMIN_ROLE_OID: ${ADMIN_ROLE_OID}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4000:4000"
    volumes:
      - ./asterisk/config:/asterisk-config
      - recordings_data:/recordings:ro
    networks:
      - lab-net
  prometheus:
    image: prom/prometheus:latest
    container_name: lab-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - lab-net
  grafana:
    image: grafana/grafana:latest
    container_name: lab-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - lab-net
networks:
  lab-net:
    driver: bridge
volumes:
  postgres_data:
  db_data:
  midpoint_home:
  asterisk_data:
  recordings_data:
  prometheus_data:
  grafana_data:
