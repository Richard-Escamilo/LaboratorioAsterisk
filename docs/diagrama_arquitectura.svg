<svg width="900" height="740" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
<title>Arquitectura del sistema de call center</title>
<desc>Diagrama mostrando el flujo desde la consola web de administracion, pasando por el backend, midPoint como gestor de identidad, Asterisk como PBX, hasta el softphone del agente, junto con la capa de persistencia de datos.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="560" fill="#ffffff"/>

<g>
<rect x="250" y="40" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Consola web</text>
<text x="340" y="78" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Login + gestion</text>
</g>

<line x1="340" y1="96" x2="340" y2="140" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<text x="350" y="120" font-family="sans-serif" font-size="12" fill="#5F5E5A">1. Admin crea usuario</text>

<g>
<rect x="230" y="140" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="160" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Backend Node.js</text>
<text x="340" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">API + AMI + poller</text>
</g>

<path d="M340,196 L340,212 L220,212 L220,240" fill="none" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M340,196 L340,212 L440,212 L440,240" fill="none" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="130" y="240" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="220" y="260" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">midPoint</text>
<text x="220" y="278" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Identidad (IAM)</text>
</g>

<g>
<rect x="330" y="240" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="440" y="260" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Bases de datos</text>
<text x="440" y="278" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">MariaDB + PostgreSQL</text>
</g>

<path d="M220,296 L220,320 L340,320 L340,340" fill="none" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<text x="225" y="313" font-family="sans-serif" font-size="12" fill="#5F5E5A">2. Poller provisiona SIP</text>

<g>
<rect x="240" y="340" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="360" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Asterisk PBX</text>
<text x="340" y="378" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Telefonia SIP/RTP</text>
</g>

<line x1="340" y1="396" x2="340" y2="440" stroke="#444441" stroke-width="1" marker-end="url(#arrow)"/>
<text x="350" y="420" font-family="sans-serif" font-size="12" fill="#5F5E5A">3. Login SIP</text>

<g>
<rect x="250" y="440" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="460" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Softphone</text>
<text x="340" y="478" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">WebRTC o SIP</text>
</g>

<text x="340" y="530" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888780">Puertos: Consola 8443 / Backend 4000 / midPoint 8080 / MariaDB 3306 / PostgreSQL 5432 / Asterisk 5061 (TLS), 8089 (WSS), 10000-10100 (RTP)</text>
</svg>
